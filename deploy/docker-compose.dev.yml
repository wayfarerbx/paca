# Development compose for contributors and local end-to-end testing.
#
# Full stack:
#   docker compose -f deploy/docker-compose.dev.yml up -d
#
# Infra only:
#   docker compose -f deploy/docker-compose.dev.yml up -d postgres valkey
#
# The application services remain optional so contributors can also run them
# directly on the host for faster feedback loops.

name: paca-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paca
      POSTGRES_PASSWORD: paca
      POSTGRES_DB: paca
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../services/api/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paca -d paca"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Database backups ─────────────────────────────────────────────────────────
  # Dev mirror of the db-backup service in docker-compose.prod.yml — same
  # entrypoint script and cron mechanism, pointed at the local postgres
  # container by default. Writes to BACKUP_DIR on the schedule given by
  # BACKUP_CRON, pruning dumps older than BACKUP_RETENTION_DAYS.
  #
  # To test without waiting for the cron schedule, run the backup on demand:
  #   docker compose -f deploy/docker-compose.dev.yml exec db-backup run-backup.sh
  #
  # To test retention pruning, backdate a dump's mtime past the retention
  # window and re-run the script above:
  #   docker compose -f deploy/docker-compose.dev.yml exec db-backup \
  #     sh -c 'touch -t "$(date -d "@$(($(date +%s)-10*86400))" +%Y%m%d%H%M)" /backups/paca-fake.sql.gz'
  db-backup:
    image: postgres:16-alpine
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://paca:paca@postgres:5432/paca?sslmode=disable}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      # Standard 5-field cron syntax: minute hour day-of-month month day-of-week.
      # Default: 02:00 daily. Override in .env.dev with something like
      # "*/2 * * * *" to watch it fire every 2 minutes while testing.
      BACKUP_CRON: ${BACKUP_CRON:-0 2 * * *}
      TZ: ${TZ:-UTC}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ "$$(echo "$$BACKUP_CRON" | wc -w)" -ne 5 ]; then
          echo "Invalid BACKUP_CRON '$$BACKUP_CRON': expected 5 fields (minute hour day month weekday)" >&2
          exit 1
        fi

        cat > /etc/backup.env <<EOF
        DATABASE_URL="$$DATABASE_URL"
        BACKUP_RETENTION_DAYS="$$BACKUP_RETENTION_DAYS"
        EOF

        cat > /usr/local/bin/run-backup.sh <<'EOS'
        #!/bin/sh
        set -e -o pipefail
        . /etc/backup.env
        ts="$$(date +%Y%m%d-%H%M%S)"
        tmp="/backups/.paca-$${ts}.sql.gz.tmp"
        out="/backups/paca-$${ts}.sql.gz"
        if pg_dump "$$DATABASE_URL" --no-owner | gzip > "$$tmp"; then
          mv "$$tmp" "$$out"
          echo "Backup written: $$out"
          find /backups -maxdepth 1 -name 'paca-*.sql.gz' -mtime "+$${BACKUP_RETENTION_DAYS}" -delete
        else
          echo "Backup failed at $${ts}" >&2
          rm -f "$$tmp"
        fi
        EOS
        chmod +x /usr/local/bin/run-backup.sh

        mkdir -p /var/spool/cron/crontabs
        echo "$$BACKUP_CRON /usr/local/bin/run-backup.sh >>/proc/1/fd/1 2>>/proc/1/fd/2" > /var/spool/cron/crontabs/root

        echo "Database backup service started — schedule: $$BACKUP_CRON $$TZ (retention: $$BACKUP_RETENTION_DAYS days)."
        exec crond -f -d 8
    volumes:
      - ${BACKUP_DIR:-./backups}:/backups
    depends_on:
      postgres:
        condition: service_healthy
        required: false

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../services/api
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    # air is already installed in the image; no per-start download needed.
    command: air
    environment:
      # Limit parallel package compilation to avoid OOM kills on memory-constrained
      # Docker Desktop VMs (mirrors the -p=1 flag used in the production Dockerfile).
      GOFLAGS: "-p=1"
      ENV: development
      PORT: "8080"
      DATABASE_URL: postgres://paca:paca@postgres:5432/paca?sslmode=disable
      REDIS_URL: redis://valkey:6379/0
      JWT_SECRET: dev-change-in-production
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
      COOKIE_SECURE: "false"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: adminpassword
      # Storage — MinIO by default; switch to "s3" and set real credentials for AWS S3.
      STORAGE_PROVIDER: minio
      STORAGE_ENDPOINT: minio:9000
      # Public URL used to rewrite presigned URLs so browsers can reach MinIO
      # through the Caddy gateway instead of the internal Docker hostname.
      STORAGE_PUBLIC_URL: ${PUBLIC_HOST:-http://localhost}/storage
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: paca
      STORAGE_ACCESS_KEY_ID: minioadmin
      STORAGE_SECRET_ACCESS_KEY: minioadmin
      STORAGE_USE_SSL: "false"
      # Encryption key for sensitive values (plugin tokens/secrets).
      ENCRYPTION_KEY: "3b4a93a4f2ffa732a5f7cf44b9a37050e49f5f9c3f105c3995432b9dd49e28ac"
      # Pre-shared key for the AI agent service to authenticate with the API
      # without a database-stored API key.  Must match PACA_API_KEY in the
      # ai-agent service.
      AGENT_API_KEY: dev-agent-api-key-change-in-production
      # Public base URL used by plugins to generate callback/webhook URLs.
      PUBLIC_URL: ${PUBLIC_HOST:-http://localhost}
      # Plugin subsystem — load WASM binaries + migrations from the local plugin store.
      PLUGINS_WASM_DIR: /plugins
      PLUGINS_FRONTEND_DIR: /plugins-frontend
      PLUGINS_MCP_DIR: /plugins-mcp
    volumes:
      - ../services/api:/workspace
      # Backend plugin store — WASM binaries and SQL migrations.
      # Writable so the marketplace installer can download and extract artifacts.
      # Layout: /plugins/<plugin-id>/backend.wasm + /plugins/<plugin-id>/migrations/
      - ../plugins/local/backend:/plugins
      # Frontend plugin store — built JS bundles and MCP bundles.
      # Writable for API marketplace installs; also mounted read-only by the gateway.
      # Layout: /plugins-frontend/<plugin-id>/assets/remoteEntry.js
      - ../plugins/local/frontend:/plugins-frontend
      # MCP plugin store — self-contained ESM bundles served at /plugins-mcp/.
      # Writable for API marketplace installs; also mounted read-only by the gateway.
      # Layout: /plugins-mcp/<plugin-id>/mcp.js
      - ../plugins/local/mcp:/plugins-mcp
      # go modules are pre-downloaded into the image layer; no volume needed.
      # Persist the Go build cache so the first build after a container restart
      # reuses previously compiled packages instead of starting cold.
      - go_build_cache:/root/.cache/go-build
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    image: oven/bun:1-alpine
    working_dir: /workspace
    command: sh -c "bun install && bun run dev --host 0.0.0.0 --port 3000"
    environment:
      NODE_ENV: development
      DOCKER: "true"
      NODE_OPTIONS: "--max-old-space-size=2048"
      VITE_ALLOWED_HOST: ${VITE_ALLOWED_HOST:-}
    volumes:
      - ../apps/web:/workspace
      - web_node_modules:/workspace/node_modules
      - bun_cache:/root/.bun/install/cache

  realtime:
    build:
      context: ../services/realtime
      dockerfile: Dockerfile.dev
    working_dir: /app
    command: sh -c "bun install && bun run --watch src/index.ts"
    environment:
      PORT: "3001"
      NODE_ENV: development
      # Internal service-to-service URL — the realtime service calls the API
      # directly, bypassing Caddy, so no prefix stripping is needed.
      API_URL: http://api:8080
      REDIS_URL: redis://valkey:6379/0
      CORS_ORIGINS: ${PUBLIC_HOST:-http://localhost}
      LOG_LEVEL: debug
    volumes:
      - ../services/realtime:/app
      - realtime_node_modules:/app/node_modules
    depends_on:
      valkey:
        condition: service_healthy
      api:
        condition: service_started
  
  gateway:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      # Frontend plugin store — built JS bundles, served at /plugins/.
      # Layout: /var/www/plugins/<plugin-id>/assets/remoteEntry.js
      - ../plugins/local/frontend:/var/www/plugins:ro
      # MCP plugin store — self-contained ESM bundles, served at /plugins-mcp/.
      # Layout: /var/www/plugins-mcp/<plugin-id>/mcp.js
      - ../plugins/local/mcp:/var/www/plugins-mcp:ro
    depends_on:
      - api
      - web
      - realtime

  # MinIO — S3-compatible object store for development.
  # Swap for AWS S3 in production by updating STORAGE_* env vars in the API service.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  mcp:
    image: oven/bun:1-alpine
    working_dir: /workspace
    command: sh -c "bun install && bun run watch"
    volumes:
      - ../apps/mcp:/workspace
    healthcheck:
      test: ["CMD", "test", "-f", "/workspace/build/index.js"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 120s

  ai-agent:
    build:
      context: ../services/ai-agent
      dockerfile: Dockerfile.dev
    environment:
      VALKEY_URL: redis://valkey:6379/0
      DATABASE_URL: postgres://paca:paca@postgres:5432/paca
      INTERNAL_API_KEY: dev-internal-key-change-in-production
      API_BASE_URL: http://api:8080
      # Gateway base URL — the MCP server uses this to resolve plugin MCP bundle
      # URLs (e.g. /plugins-mcp/<id>/mcp.js).  The gateway (Caddy) serves these
      # files, not the API service.
      GATEWAY_BASE_URL: http://gateway
      # API key for the built-in Paca MCP server.  Must match AGENT_API_KEY in
      # the api service so the AI agent can authenticate via the MCP.
      PACA_API_KEY: dev-agent-api-key-change-in-production
      # Must match ENCRYPTION_KEY on the api service so that encrypted LLM API
      # keys stored in the DB can be decrypted at conversation time.
      ENCRYPTION_KEY: "3b4a93a4f2ffa732a5f7cf44b9a37050e49f5f9c3f105c3995432b9dd49e28ac"
      DOCKER_SOCKET: /var/run/docker.sock
      AGENT_SERVER_IMAGE: ghcr.io/paca-ai/paca-agent-server:latest
      PORT_POOL_START: "10000"
      PORT_POOL_SIZE: "100"
      WORKER_CONCURRENCY: "5"
      LOG_LEVEL: INFO
      # Use the local MCP source build instead of the published npm package.
      # apps/mcp is mounted at /mcp so the built entry point is always available.
      DEV_MCP_PATH: /mcp/build/index.js
    volumes:
      - ../services/ai-agent:/app
      - ai_agent_venv:/app/.venv
      - ../apps/mcp:/mcp:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      api:
        condition: service_started
      mcp:
        condition: service_healthy

volumes:
  postgres_data:
  valkey_data:
  go_build_cache:
  web_node_modules:
  bun_cache:
  minio_data:
  realtime_node_modules:
  ai_agent_venv: