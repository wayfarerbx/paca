# E2E test stack – mirrors the production topology with fixed, test-safe
# credentials.  All secrets are intentionally weak and public; never use
# these values outside of a local E2E environment.
#
# Usage (from repo root):
#   docker compose -f deploy/docker-compose.e2e.yml up -d --build --wait
#   docker compose -f deploy/docker-compose.e2e.yml down -v

name: paca-e2e

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: paca
      POSTGRES_USER: paca
      POSTGRES_PASSWORD: e2e-postgres-password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../services/api/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paca -d paca"]
      interval: 5s
      timeout: 5s
      retries: 20

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: valkey-server --appendonly yes
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    image: paca-api:e2e
    build:
      context: ../services/api
    restart: unless-stopped
    environment:
      ENV: test
      PORT: "8080"
      DATABASE_URL: postgres://paca:e2e-postgres-password@postgres:5432/paca?sslmode=disable
      REDIS_URL: redis://valkey:6379/0
      JWT_SECRET: e2e-jwt-secret-not-for-production
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
      COOKIE_SECURE: "false"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: e2e-admin-password
      STORAGE_PROVIDER: minio
      STORAGE_ENDPOINT: minio:9000
      STORAGE_PUBLIC_URL: http://localhost/storage
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: paca
      STORAGE_ACCESS_KEY_ID: e2e-minio-access-key
      STORAGE_SECRET_ACCESS_KEY: e2e-minio-secret-key
      STORAGE_USE_SSL: "false"
      # Encryption key for sensitive values (plugin tokens/secrets).
      ENCRYPTION_KEY: "3b4a93a4f2ffa732a5f7cf44b9a37050e49f5f9c3f105c3995432b9dd49e28ac"
      # Public base URL used by plugins to generate callback/webhook URLs.
      PUBLIC_URL: http://localhost
      # Plugin subsystem — load WASM binaries + migrations from the local plugin store.
      PLUGINS_WASM_DIR: /plugins
      PLUGINS_FRONTEND_DIR: /plugins-frontend
      PLUGINS_MCP_DIR: /plugins-mcp
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      # Backend plugin store — WASM binaries and SQL migrations only.
      # Writable so the marketplace installer can download and extract artifacts.
      # Never mounted to the gateway, so the WASM files are not publicly reachable.
      - ../plugins/local/backend:/plugins
      # Frontend plugin store — built JS bundles, served at /plugins/.
      # Writable for API marketplace installs; also mounted read-only by the gateway.
      - ../plugins/local/frontend:/plugins-frontend
      # MCP plugin store — self-contained ESM bundles, served at /plugins-mcp/.
      # Writable for API marketplace installs; also mounted read-only by the gateway.
      - ../plugins/local/mcp:/plugins-mcp
    healthcheck:
      test: ["CMD-SHELL", "wget -qO/dev/null -T 3 --tries=1 http://127.0.0.1:8080/api/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 20

  web:
    image: paca-web:e2e
    build:
      context: ../apps/web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO/dev/null -T 3 --tries=1 http://127.0.0.1:3000/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  realtime:
    image: paca-realtime:e2e
    build:
      context: ../services/realtime
    restart: unless-stopped
    environment:
      PORT: "3001"
      NODE_ENV: test
      API_URL: http://api:8080
      REDIS_URL: redis://valkey:6379/0
      CORS_ORIGINS: http://localhost
      LOG_LEVEL: debug
    depends_on:
      valkey:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO/dev/null -T 3 --tries=1 http://127.0.0.1:3001/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
      # Frontend plugin store — built JS bundles, served at /plugins/.
      # Layout: /var/www/plugins/<plugin-id>/assets/remoteEntry.js
      - ../plugins/local/frontend:/var/www/plugins:ro
      # MCP plugin store — self-contained ESM bundles, served at /plugins-mcp/.
      # Layout: /var/www/plugins-mcp/<plugin-id>/mcp.js
      - ../plugins/local/mcp:/var/www/plugins-mcp:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
      realtime:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO/dev/null -T 3 --tries=1 http://127.0.0.1/api/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  # MinIO — S3-compatible object store for E2E tests.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: e2e-minio-access-key
      MINIO_ROOT_PASSWORD: e2e-minio-secret-key
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  valkey_data:
  minio_data:
