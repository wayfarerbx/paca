# Production-oriented single-host compose example.
#
# This file is a self-hosting baseline for open-source users who want one
# deployable stack with the application and its stateful dependencies. Teams
# running managed PostgreSQL or Valkey can still use the same images
# and environment variables as a handoff into their own platform.
#
# ── Object storage ────────────────────────────────────────────────────────────
# MinIO runs by default (self-hosted). To use AWS S3 instead, scale MinIO to
# zero so it does not start, and supply real AWS credentials.
#
# Self-hosted with MinIO (default):
#   cp deploy/.env.production.example deploy/.env.production
#   docker compose \
#     --env-file deploy/.env.production \
#     -f deploy/docker-compose.prod.yml up -d --build
#
# With AWS S3 (MinIO container suppressed):
#   # Set STORAGE_PROVIDER=s3 and real AWS credentials in .env.production
#   docker compose \
#     --env-file deploy/.env.production \
#     -f deploy/docker-compose.prod.yml up -d --build --scale minio=0

name: paca-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-paca}
      POSTGRES_USER: ${POSTGRES_USER:-paca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../services/api/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paca} -d ${POSTGRES_DB:-paca}"]
      interval: 10s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: valkey-server --appendonly yes
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ${PACA_API_IMAGE:-paca-api:latest}
    build:
      context: ../services/api
    restart: unless-stopped
    environment:
      ENV: ${ENVIRONMENT:-production}
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-paca}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-paca}?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://valkey:6379/0}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-168h}
      JWT_REFRESH_SESSION_TTL: ${JWT_REFRESH_SESSION_TTL:-24h}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD}
      # Object storage.
      # Default: STORAGE_PROVIDER=minio — MinIO runs by default; no extra flags needed.
      # AWS S3:  set STORAGE_PROVIDER=s3 and real credentials; add --scale minio=0 to the startup command.
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-minio}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-minio:9000}
      # Rewrite presigned URL host from the internal Docker hostname to the
      # public gateway URL so browsers can reach the object store.
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL:-http://localhost/storage}
      STORAGE_REGION: ${STORAGE_REGION:-us-east-1}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-paca}
      STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID:?set STORAGE_ACCESS_KEY_ID}
      STORAGE_SECRET_ACCESS_KEY: ${STORAGE_SECRET_ACCESS_KEY:?set STORAGE_SECRET_ACCESS_KEY}
      STORAGE_USE_SSL: ${STORAGE_USE_SSL:-false}
      # GitHub integration — optional.  When GITHUB_ENCRYPTION_KEY is empty the
      # feature is disabled.  Must be a 64-char lowercase hex string (32 bytes).
      GITHUB_ENCRYPTION_KEY: ${GITHUB_ENCRYPTION_KEY:-}
      PUBLIC_URL: ${PUBLIC_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
        required: false  # skipped when --scale minio=0 (AWS S3 mode)

  web:
    image: ${PACA_WEB_IMAGE:-paca-web:latest}
    build:
      context: ../apps/web
      args:
        # VITE_API_BASE_URL is baked into the static bundle at build time.
        # Set PUBLIC_URL to your public domain (e.g. https://paca.example.com).
        VITE_API_BASE_URL: ${PUBLIC_URL:-http://localhost}
    restart: unless-stopped
    depends_on:
      - api

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-80}:80"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

  # MinIO — S3-compatible object store. Runs by default for self-hosted deployments.
  # When using AWS S3, suppress this container with --scale minio=0 and set
  # STORAGE_PROVIDER=s3 with real AWS credentials in your env file.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY_ID:?set STORAGE_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_ACCESS_KEY:?set STORAGE_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  valkey_data:
  minio_data:
