# =============================================================================
# Gateway nginx configuration
# =============================================================================
#
# Single public entrypoint for the Paca stack:
#
#   /api/*   →  REST API service  (strips the /api prefix before forwarding)
#   /*       →  Web application   (SPA with client-side routing)
#
# This file is mounted as /etc/nginx/conf.d/default.conf inside the nginx
# container, so all top-level directives here run in the http {} context.
#
# Quick-reference for contributors
# ---------------------------------
#   Rate limits    → limit_req_zone lines + limit_req inside each location
#   Upload size    → client_max_body_size
#   Timeouts       → proxy_connect/send/read_timeout inside each location
#   Security hdrs  → add_header block inside the server {} block
#
# NOTE on proxy_set_header inheritance
# -------------------------------------
# nginx does NOT merge proxy_set_header directives across contexts: if any
# proxy_set_header appears in a location block it replaces ALL inherited ones.
# To keep behaviour explicit and avoid surprises, headers are repeated in full
# inside every location block.
# =============================================================================

# -- Rate-limit zones ---------------------------------------------------------
#
# api — all API traffic: 100 req/s per IP, burst queue of 50.
#
# binary_remote_addr uses 4 B (IPv4) or 16 B (IPv6) per entry.
# 10 MB of shared memory tracks roughly 160 000 unique addresses.

limit_req_zone $binary_remote_addr zone=api:10m  rate=100r/s;

# -- WebSocket connection upgrade map -----------------------------------------
#
# Required for correct HTTP → WebSocket proxying (RFC 6455 §4).
# Used by the web location block so Vite HMR and any future realtime service
# can upgrade connections through the gateway.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Resolve Docker service names for variable-based proxy_pass targets.
resolver 127.0.0.11 ipv6=off valid=30s;

# -- Upstream pools -----------------------------------------------------------
#
# keepalive N keeps N idle connections open to each upstream so that
# successive requests reuse TCP/TLS sessions instead of opening new ones.
# Pair with "proxy_set_header Connection \"\"" (empty) in each location to
# prevent the forwarded Connection header from closing those idle connections.
#
# Note: For optional services (web, minio), we use nginx variables to allow
# graceful startup when services are not running (e.g., minio=0 for S3).

upstream api_backend {
    server api:8080;
    keepalive 32;
}

upstream realtime_backend {
    server realtime:3001;
    keepalive 16;
}

# =============================================================================
server {
    listen 80;
    server_name _;

    # Hide the nginx version from error pages and the Server response header.
    server_tokens off;

    # Reject oversized request bodies at the gateway before they reach upstreams.
    client_max_body_size 10m;

    # -- Compression ----------------------------------------------------------
    #
    # Compress text-based responses in transit. Level 5 is a good balance
    # between CPU cost and compression ratio for typical API + SPA payloads.
    # gzip_proxied any enables compression even when the upstream already set
    # a Vary header (common with pre-compressed assets from the web container).

    gzip            on;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/wasm
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/html
        text/plain;

    # -- Security headers -----------------------------------------------------
    #
    # Applied to every response regardless of which upstream served it.
    # The `always` flag ensures headers are added even on error responses.
    #
    # X-XSS-Protection is intentionally 0: modern browsers enforce CSP instead
    # and the legacy header can introduce vulnerabilities in older IE builds.

    add_header X-Frame-Options        "DENY"                                      always;
    add_header X-Content-Type-Options "nosniff"                                   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"           always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection       "0"                                         always;

    # =========================================================================
    # Routing
    # =========================================================================

    # -- Object storage (MinIO) -----------------------------------------------
    #
    # Proxies presigned upload and download requests to the internal MinIO
    # container.  The Host header is rewritten to the internal MinIO address
    # so that AWS Signature V4 validation succeeds: MinIO re-derives the HMAC
    # using the Host it receives, which must match the host that was used when
    # the presigned URL was generated (minio:9000).
    #
    # The API rewrites presigned URL hosts from "minio:9000" to
    # "STORAGE_PUBLIC_URL" (e.g. "http://localhost/storage") before returning
    # them to clients, so browsers always receive routable URLs.
    #
    # Large uploads bypass the gateway body-size limit via client_max_body_size 0.

    location /storage/ {
        set $minio_backend http://minio:9000;
        proxy_pass         $minio_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              minio:9000;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 0;
        proxy_request_buffering  off;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # -- Realtime service (Socket.IO) -----------------------------------------
    #
    # Proxies WebSocket upgrade requests for the Socket.IO server.
    # The /ws/ prefix is stripped before forwarding so the realtime service
    # sees the standard /socket.io/ path.
    #
    # Client-side connection:
    #   io("http://localhost", { path: "/ws/socket.io", withCredentials: true })

    location /ws/ {
        proxy_pass         http://realtime_backend/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;
        # Long read timeout to keep WebSocket connections alive.
        proxy_read_timeout     3600s;
    }

    # -- API routes -----------------------------------------------------------
    #
    # Forwards the /api prefix as-is to the upstream:
    #   /api/v1/users  →  /api/v1/users
    #   /api/healthz   →  /api/healthz

    location /api/ {
        limit_req        zone=api burst=50 nodelay;
        limit_req_status 429;

        proxy_pass         http://api_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # -- Local plugin frontend assets -----------------------------------------
    #
    # Serves statically-built micro-frontend bundles for locally installed
    # plugins.  Only the plugins/local/frontend directory is mounted here
    # (plugins/local/backend is mounted exclusively to the API container),
    # so WASM binaries and SQL migrations are never reachable over HTTP.
    #
    # URL layout:
    #   /plugins/<plugin-id>/assets/remoteEntry.js
    #
    # Set remoteEntryUrl in each plugin's plugin.json to:
    #   /plugins/<plugin-id>/assets/remoteEntry.js

    location /plugins/ {
        alias /var/www/plugins/;
        # Disable directory listings.
        autoindex off;
        # Allow WASM and JS content types used by module-federation bundles.
        types {
            application/javascript  js;
            application/wasm        wasm;
            text/css                css;
            text/html               html;
            image/svg+xml           svg;
            font/woff               woff;
            font/woff2              woff2;
        }

        # Fingerprinted assets can be cached immutably for a long time.
        add_header Cache-Control "public, max-age=900, immutable" always;
    }

    # -- MCP plugin bundles ---------------------------------------------------
    #
    # Self-contained ESM bundles loaded at runtime by the MCP server.
    # Kept on a separate path from frontend assets so WASM/CSS MIME types
    # and module-federation concerns do not bleed into MCP serving.
    #
    # Set remoteEntryUrl in each plugin's plugin.json mcp section to an
    # absolute URL, for example:
    #   ${PUBLIC_URL}/plugins-mcp/<plugin-id>/mcp.js

    location /plugins-mcp/ {
        alias /var/www/plugins-mcp/;
        autoindex off;
        types {
            application/javascript  js;
        }
        add_header Cache-Control "public, max-age=900, immutable" always;
    }

    # -- Web application (SPA) ------------------------------------------------
    #
    # Upgrade + Connection headers are forwarded so WebSocket connections work
    # for Vite HMR in the dev compose stack.

    location / {
        set $web_backend http://web:3000;
        proxy_pass         $web_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }
}
