name: realtime-pr-ci

on:
  pull_request:
    paths:
      - "services/realtime/**"
      - ".github/workflows/realtime-pr-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: realtime-pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  realtime-quality:
    name: Lint, typecheck, and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: services/realtime

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.23"

      - name: Cache Bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-realtime-${{ hashFiles('services/realtime/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-realtime-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Biome lint
        run: bun run lint

      - name: Typecheck
        run: bun run check

      - name: Build Docker image
        run: docker build -t paca-realtime-ci .
