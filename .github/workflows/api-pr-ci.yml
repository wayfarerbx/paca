name: api-pr-ci

on:
  pull_request:
    paths:
      - "services/api/**"
      - ".github/workflows/api-pr-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint — fast feedback, no services needed
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: services/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/api/go.sum

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

  # ---------------------------------------------------------------------------
  # 2. Build — verify the binary compiles
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: services/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/api/go.sum

      - name: Build binary
        run: make build

  # ---------------------------------------------------------------------------
  # 3. Unit & integration tests — in-memory fakes, no external services needed
  # ---------------------------------------------------------------------------
  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: services/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/api/go.sum

      - name: Run tests (race detector)
        run: go test -race -timeout 60s -coverprofile=coverage.out $(go list ./... | grep -v '/test/e2e')

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: services/api/coverage.out
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 4. E2E tests — full HTTP flow via testcontainers-go (manages own containers)
  # ---------------------------------------------------------------------------
  test-e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]

    defaults:
      run:
        working-directory: services/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/api/go.sum

      - name: Run E2E tests
        # 300s: Postgres + Valkey testcontainer startup + full migration set can
        # take 60-90s on cold CI runners, leaving ~210s for the actual tests.
        env:
          PACA_E2E: "1"
        run: go test -v -timeout 300s ./test/e2e/...
