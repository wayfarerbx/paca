name: ai-agent-pr-ci

on:
  pull_request:
    paths:
      - "services/ai-agent/**"
      - "services/agent-server/**"
      - ".github/workflows/ai-agent-pr-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ai-agent-pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint — fast feedback, no services needed
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: services/ai-agent

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-dependency-glob: "services/ai-agent/pyproject.toml"

      - name: Install dev dependencies
        env:
          VIRTUAL_ENV: ""
        run: |
          uv venv
          uv pip install --group dev -e .

      - name: Run ruff (lint)
        run: uv run ruff check src/

      - name: Run ruff (format check)
        run: uv run ruff format --check src/

  # ---------------------------------------------------------------------------
  # 2. Unit tests — no external services needed
  # ---------------------------------------------------------------------------
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: services/ai-agent

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-dependency-glob: "services/ai-agent/pyproject.toml"

      - name: Install dev dependencies
        env:
          VIRTUAL_ENV: ""
        run: |
          uv venv
          uv pip install --group dev -e .

      - name: Run pytest
        run: uv run pytest --tb=short

  # ---------------------------------------------------------------------------
  # 3. Docker build — verify the image builds cleanly
  # ---------------------------------------------------------------------------
  build:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: services/ai-agent
          file: services/ai-agent/Dockerfile
          push: false
          tags: paca-ai-agent-ci:pr
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 4. E2E tests — real OpenHands agent-server sandbox + a fake in-process
  #    LLM server. Regression coverage for the agent-reply-never-persisted
  #    bug (https://github.com/Paca-AI/paca/issues/211, #214).
  # ---------------------------------------------------------------------------
  test-e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [lint, test]

    defaults:
      run:
        working-directory: services/ai-agent

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-dependency-glob: "services/ai-agent/pyproject.toml"

      - name: Install dev dependencies
        env:
          VIRTUAL_ENV: ""
        run: |
          uv venv
          uv pip install --group dev -e .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build agent-server sandbox image
        # Built locally from this branch's own Dockerfile — pulling the
        # published ghcr.io/paca-ai/paca-agent-server tag instead would test
        # whatever happens to be published in the registry rather than this
        # PR's changes, and can pass or fail for reasons unrelated to the
        # diff (see the parent_id/openhands-sdk incident this replaced).
        # Tagged to match config.py's AGENT_SERVER_IMAGE default exactly, so
        # docker_workspace.py picks up this local build with no pull.
        uses: docker/build-push-action@v6
        with:
          context: services/agent-server
          push: false
          load: true
          tags: ghcr.io/paca-ai/paca-agent-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run E2E tests
        env:
          PACA_E2E: "1"
        run: uv run pytest tests/e2e -v --tb=short
